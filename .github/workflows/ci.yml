name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run tests
        run: cargo test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Verilator lint
        run: |
          verilator --lint-only -Wall -sv -Irtl \
            rtl/common.vh rtl/decoder.sv rtl/register_unit.sv \
            rtl/alu_unit.sv rtl/muldiv_unit.sv rtl/stack_unit.sv \
            rtl/barrier_unit.sv rtl/blkram.sv rtl/sequencer.sv \
            rtl/execute.sv rtl/tta.sv \
            rtl/cmod_a35t_top.sv --top-module cmod_a35t_top

  synthesize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys

      - name: Yosys synthesis check
        run: |
          yosys -p "
            read_verilog -sv \
              rtl/common.vh rtl/decoder.sv rtl/register_unit.sv \
              rtl/alu_unit.sv rtl/muldiv_unit.sv rtl/stack_unit.sv \
              rtl/barrier_unit.sv rtl/blkram.sv rtl/sequencer.sv \
              rtl/execute.sv rtl/tta.sv rtl/cmod_a35t_top.sv;
            hierarchy -top cmod_a35t_top;
            proc; opt;
            synth -top cmod_a35t_top
          "
